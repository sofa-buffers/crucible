# Fast, blocking regression gate — runs on every push and PR.
#
# Bootstraps the corelibs (their `main` tips) + sofabgen, builds all 12 replay
# drivers, and runs the GREEN oracles: the seed differential, the resolved-findings
# regression corpus, the cross-encode / structured-value differential, the union
# suite, limit mode, the structural sweep gate, and the materialized-value
# (element-access) differential. Any divergence fails the run — so a corelib bump
# (or a Crucible change) that reintroduces a resolved finding is caught the moment
# it lands. Runs in the prebuilt toolchain image (see image.yml); the per-driver
# timeout keeps a hanging driver from wedging the job (it is reported as a finding
# instead).
#
# Corelibs are pinned to `main` on purpose: this is a conformance fuzzer, so a red
# gate on an upstream regression is exactly the signal we want. Open findings
# (F-0004, F-0012) diverge by design and are kept OUT of these green corpora — they
# live in findings/ until fixed, as do the reproducers that trip the open
# INVALID-vs-INCOMPLETE precedence hole (documentation#15). See
# corpus/regression/README.md for what is admitted and why.
name: replay

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  differential:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sofa-buffers/crucible-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Bootstrap (corelibs@main + sofabgen)
        env:
          # actions:read on sofa-buffers/generator so bootstrap can pull the latest green
          # sofabgen CI build. The repo-scoped GITHUB_TOKEN cannot read another repo's
          # artifacts, so create a PAT secret SOFABGEN_TOKEN. Without it, bootstrap falls
          # back — loudly — to the latest tagged release (the run still bootstraps).
          SOFABGEN_TOKEN: ${{ secrets.SOFABGEN_TOKEN }}
        run: ./scripts/bootstrap.sh   # latest green sofabgen CI build (else release) + corelibs@main

      - name: Differential over seeds (the green gate)
        run: ./scripts/run.sh

      # Reproducers for findings that are already fixed: a divergence here means a
      # resolved bug came back. See corpus/regression/README.md.
      - name: Differential over the resolved-findings regression corpus
        run: CORPUS=corpus/regression ./scripts/run.sh

      # §2/§3 canonicality conformance seeds (WP-08): an all-default nested struct is
      # still framed (§2), and a non-canonical trailing-default array run is accepted +
      # re-encoded canonically (§3 / the F-0010 trim rule). See corpus/conformance/README.md.
      - name: Differential over the §2/§3 canonicality conformance seeds
        run: CORPUS=corpus/conformance ./scripts/run.sh

      - name: Cross-encode over structured values
        run: REGEN=0 ./scripts/cross-encode.sh

      # The union schema — the one wire feature schema/probe.sofab.yaml lacks.
      - name: Union suite (probe-union schema)
        run: ./scripts/run-union.sh

      - name: Limit mode (receiver-side caps)
        run: ./scripts/run-limits.sh

      # Structural sweeps: a normative rule enumerated across EVERY schema position,
      # checked for agreement AND conformance. All seven axes now block (§7.3 wiretype
      # promoted 2026-07-22 once F-0025 landed). sweep.sh rebuilds vs probe, so it is safe here
      # after limit mode (which leaves probe-dyn binaries).
      - name: Structural sweep gate (all seven axes blocking)
        run: ./scripts/sweep.sh

      # Element-access oracle (oracle/materialized.md): every driver dumps the DECODED
      # value (all fields + array elements explicit, floats as raw bits) under
      # SOFAB_MATERIALIZE=1, catching a decode that differs only where the sparse
      # round-trip wire elides. Checks agreement (all 12) AND conformance (the C anchor
      # vs the reference). 75×12 → 0 divergences. Rebuilds vs probe, safe after limit mode.
      - name: Materialized-value differential (element-access oracle)
        run: ./scripts/materialize.sh

# Build the Crucible CI toolchain image and publish it to GHCR.
#
# A full differential run needs every language toolchain + its fuzzing framework
# (clang/libFuzzer, cargo-fuzz, go, dotnet+SharpFuzz, zig, node+Jazzer.js,
# jdk+maven, python+atheris/cython) — that is the .devcontainer/Dockerfile, ~15 min
# to build. So we build it ONCE here (on Dockerfile changes, or manually) and push
# it to ghcr.io/sofa-buffers/crucible-ci:latest; the replay + nightly jobs then start
# in that prebuilt container in seconds instead of re-installing toolchains every run.
#
# FIRST-TIME SETUP: run this workflow manually once (Actions → image → Run workflow)
# to seed GHCR before the first replay/nightly run, then make the package readable
# (public, or leave private — the jobs authenticate with GITHUB_TOKEN).
name: image

on:
  push:
    branches: [main]
    paths: ['.devcontainer/Dockerfile']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The image installs clang + rust + go + dotnet + zig + node + jdk — several GB.
      # ubuntu-latest ships ~14 GB free, which a build this heavy can exhaust
      # ("no space left on device"); reclaim the preinstalled SDKs we don't need.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL "${AGENT_TOOLSDIRECTORY:-}" 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          df -h /

      # build-push-action needs a buildx (docker-container) driver for the gha cache
      # exporter — the default docker driver does not support `cache-to: type=gha`.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push crucible-ci:latest
        uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: true
          tags: ghcr.io/sofa-buffers/crucible-ci:latest
          # cache the ~2-3 GB toolchain layers between builds (needs Buildx, above)
          cache-from: type=gha
          cache-to: type=gha,mode=max

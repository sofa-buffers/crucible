# Crucible fuzzed message — the "full scale" message (Phase 3).
#
# This is the family's full-scale example (mirrors arena's schema/message.sofab.yaml
# and the c-cpp fuzzer's full_scale_example): every scalar width, fp32/fp64, a
# string, a blob, eight numeric arrays, nested fp arrays, an array of strings, and
# an array of blobs.
# It exercises far more of the wire format than the Phase-1 `probe`.
#
# The message is intentionally still keyed `probe` so the generated type name
# (Probe / probe / message_probe_t) is stable and the drivers — which are
# schema-agnostic under the round-trip canonical form (oracle/canonical.md) — need
# no changes when the schema scales. Field ids are the wire ids.
version: 1
messages:
  probe:
    summary: |
      The full-scale fuzzed message: all scalar widths, floats, string, blob,
      numeric arrays, a nested struct, a struct of arrays, and an array of strings.
    payload:
      u8:  { id: 0, type: u8 }
      i8:  { id: 1, type: i8 }
      u16: { id: 2, type: u16 }
      i16: { id: 3, type: i16 }
      u32: { id: 4, type: u32 }
      i32: { id: 5, type: i32 }
      u64: { id: 6, type: u64 }
      i64: { id: 7, type: i64 }

      nested:
        id: 10
        type: struct
        fields:
          f32:         { id: 0, type: fp32 }
          f64:         { id: 1, type: fp64 }
          str:         { id: 2, type: string, maxlen: 32 }
          bytes_field: { id: 3, type: blob,   maxlen: 4 }

      arrays:
        id: 100
        type: struct
        fields:
          u8:  { id: 0, type: array, items: { type: u8,  count: 5 } }
          i8:  { id: 1, type: array, items: { type: i8,  count: 5 } }
          u16: { id: 2, type: array, items: { type: u16, count: 5 } }
          i16: { id: 3, type: array, items: { type: i16, count: 5 } }
          u32: { id: 4, type: array, items: { type: u32, count: 5 } }
          i32: { id: 5, type: array, items: { type: i32, count: 5 } }
          u64: { id: 6, type: array, items: { type: u64, count: 5 } }
          i64: { id: 7, type: array, items: { type: i64, count: 5 } }
          nested:
            id: 10
            type: struct
            fields:
              fp32: { id: 0, type: array, items: { type: fp32, count: 5 } }
              fp64: { id: 1, type: array, items: { type: fp64, count: 5 } }

      string_array:
        id: 200
        type: array
        items: { type: string, count: 5, maxlen: 64 }

      # blob analogue of string_array (id 200): the index-keyed wrapper whose heap
      # container (_BlobSeq) has the same unguarded shape as the string-array path
      # F-0013 hardened. `probe` had no blob array, so the over-index / over-maxlen
      # blob-element paths were untested (F-0013 residual, docs/TODO.md).
      blob_array:
        id: 201
        type: array
        items: { type: blob, count: 5, maxlen: 64 }

      # NOTE (WP-05, held): an `array of struct{k,v}` (id 202, the map pattern) is the
      # planned next feature, and `engine/structured/schema.py` already models it (the
      # `struct_wrapper` descriptor kind). It is **kept out of `probe` for now** because
      # adding it turns the base round-trip red on every message: the C object encoder
      # does not elide the trailing all-default struct run (§5.1), re-encoding an
      # all-default array-of-struct as N empty frames — **F-0030 / corelib-c-cpp#109**.
      # Fold it in here (id 202) once that fix lands; all 13 then agree. See docs/TODO.md.

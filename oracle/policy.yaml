# Allowed-divergence policy.
#
# Differential testing needs a definition of which divergences are BUGS vs
# LEGAL. This file encodes that. Every rule should eventually cite a clause in
# documentation/MESSAGE_SPEC.md, or record that none exists yet (a spec hole to
# file upstream). See docs/PLAN.md §8.
#
# Phase 1 starts permissive and tightens as the spec firms up.

version: 0

# How the comparator treats a mismatch on each axis:
#   hard  -> a divergence here fails the run (a finding)
#   soft  -> reported as a warning, does not fail the run
comparison:
  # Disagreement on the three-valued verdict A(COMPLETE) / I(INCOMPLETE) /
  # R(INVALID) between implementations (MESSAGE_SPEC §7). This is the core interop
  # bug and is always hard — including an impl that collapses INCOMPLETE into
  # accept (A) or reject (R) instead of emitting I.
  verdict: hard

  # On mutual ACCEPT, the decoded canonical value must match.
  accept_value: hard

  # On mutual INCOMPLETE, whether the partial re-encoded value must match. Soft in
  # Phase 2: partial-value materialization on a truncated stream is not aligned
  # across languages yet (same rationale as reject_class). The I verdict itself is
  # hard (above); only the payload comparison is soft.
  incomplete_value: soft

  # On mutual REJECT, whether the reject *class* must match. Soft in Phase 1:
  # the per-language error taxonomies are not aligned yet, so two impls
  # rejecting the same bytes for nominally different reasons is not (yet) a bug.
  # Tighten to `hard` once the taxonomy in canonical.md is enforced everywhere.
  reject_class: soft

  # On mutual LIMIT_EXCEEDED (limit mode only), whether the optional class must
  # match. Soft for the same reason as reject_class. The L verdict itself is hard
  # (via `verdict` above): in limit mode every driver is generated with identical
  # max_dyn_* caps, so they must agree on L vs A/I/R. See oracle/canonical.md.
  limit_class: soft

# Specific inputs where divergence is explicitly tolerated, each with a reason
# and (eventually) a spec citation. Empty in Phase 1.
#
#   - id: <stable name>
#     applies_to: [<input hash or corpus file>]
#     axis: verdict | accept_value | reject_class
#     reason: <why this divergence is legal>
#     spec: <MESSAGE_SPEC.md clause, or "UNSPECIFIED — file upstream">
allow: []

# PLAN §8 is now RESOLVED. The open question was: is decoding of truncated input
# specified (one correct outcome) or undefined? MESSAGE_SPEC §7 (finish-less
# three-valued decode) settles it: truncated input is INCOMPLETE — a distinct,
# non-error verdict (line "I"), neither accept (A) nor reject (R). So verdict stays
# hard and F-0001's 7-accept/5-reject split is a genuine bug on both sides: the
# target is every impl emitting I. Genuinely malformed bytes remain INVALID (R).
notes:
  truncated_input: SPECIFIED as INCOMPLETE — MESSAGE_SPEC §7; verifies F-0001
  malformed_input: INVALID — MESSAGE_SPEC §7 (unknown wire-type, >64-bit varint,
    count/length over max, MAX_DEPTH, stray sequence-end)
  limit_exceeded: >-
    A configured receiver-side decode cap (max_dyn_array_count / max_dyn_string_len /
    max_dyn_blob_len, generator#102) on a schema-UNBOUNDED field. This is a POLICY
    rejection, a category distinct from INVALID: the bytes are well-formed and decode
    under a looser/unset cap. Surfaced as the `L` verdict (limit mode only). SPEC
    BASIS: analogue of the MAX_DEPTH stack bound (MESSAGE_SPEC §5.4); the heap-limit
    note is not yet in MESSAGE_SPEC — SPEC HOLE to file upstream (tracked via
    generator#102). Differing *configured* caps across impls are NOT a divergence;
    limit mode avoids that by generating the whole roster with identical caps.
